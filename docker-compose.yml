# DEV ONLY: no master key. Production MUST set MEILI_MASTER_KEY.
services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nourish
      POSTGRES_PASSWORD: nourish
      POSTGRES_DB: nourishflow
    volumes:
      - pgdata:/var/lib/postgresql/data

  meilisearch:
    image: getmeili/meilisearch:v1.10
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: "dev-master-key-for-local-use-only"
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilidata:/meili_data

volumes:
  pgdata:
  meilidata:
